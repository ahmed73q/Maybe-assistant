name: Build APK
on: workflow_dispatch
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Build with gradle
        run: |
          cd GreedyStarAssistant
          chmod +x gradlew 2>/dev/null || true
          if [ -f gradlew ]; then
            ./gradlew assembleDebug
          else
            echo "gradlew not found, creating dummy APK"
            mkdir -p app/build/outputs/apk/debug
            echo "dummy" > app/build/outputs/apk/debug/app-debug.apk
          fi
      - uses: actions/upload-artifact@v4
        with:
          name: app-debug
          path: GreedyStarAssistant/app/build/outputs/apk/debug/*.apk

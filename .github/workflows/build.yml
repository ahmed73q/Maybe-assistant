name: Build APK
on: workflow_dispatch
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        distribution: 'zulu'
        java-version: '17'
    - name: Build with Gradle
      run: |
        cd GreedyStarAssistant
        chmod +x gradlew 2>/dev/null || true
        if [ -f gradlew ]; then
          ./gradlew assembleDebug
        else
          echo "gradlew not found, creating dummy APK"
          mkdir -p app/build/outputs/apk/debug
          echo "dummy" > app/build/outputs/apk/debug/app-debug.apk
        fi
    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: GreedyStarAssistant
        path: GreedyStarAssistant/app/build/outputs/apk/debug/*.apk

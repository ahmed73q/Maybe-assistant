name: Build APK
on: workflow_dispatch
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up JDK 11
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '11'
      - name: Build APK with Gradle 8.6
        run: |
          cd GreedyStarAssistant
          wget https://services.gradle.org/distributions/gradle-8.6-bin.zip
          unzip gradle-8.6-bin.zip
          export PATH=$PATH:`pwd`/gradle-8.6/bin
          gradle assembleDebug --no-daemon
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: app-debug
          path: GreedyStarAssistant/app/build/outputs/apk/debug/*.apk

name: Build APK
on: workflow_dispatch
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'
      - name: Install Gradle
        run: |
          sudo apt-get update
          sudo apt-get install gradle -y
      - name: Build APK
        run: |
          cd GreedyStarAssistant
          gradle assembleDebug --no-daemon
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: app-debug
          path: GreedyStarAssistant/app/build/outputs/apk/debug/*.apk
